name: Tests - kyc-widget-web-sdk

on:
  push:
    paths:
      - 'packages/kyc-widget-web-sdk/**'
    branches-ignore:
      - sandbox
      - 'environment/*'

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      NPM_WORKSPACE: packages/kyc-widget-web-sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Get NPM cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

      - name: Restore NPM cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-arc-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-arc-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --workspace $NPM_WORKSPACE

      - name: Run typecheck
        run: npm run typecheck --workspace $NPM_WORKSPACE

      - name: Run tests
        run: npm run test --workspace $NPM_WORKSPACE
